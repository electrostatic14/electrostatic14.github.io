<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR: ЦБ - Экстренный Вызов</title>
    <style>
        /* Modern UI/UX Style */
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        
        body {
            margin: 0; background: #050505; color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative; width: 100%; max-width: 420px;
            height: 72vh; margin-top: 10px; border: 2px solid #333;
            background: #111; overflow: hidden; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* HUD - Верхняя панель */
        .ui-top {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px; border-radius: 14px;
        }

        .score-box { font-weight: 800; font-size: 18px; letter-spacing: 1px; color: #fff; }

        .hp-container { width: 130px; }
        .hp-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #ff4b2b; }
        .hp-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 5px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4b2b, #ff416c); transition: 0.3s; }

        /* Кнопки управления */
        .controls { 
            display: flex; width: 100%; max-width: 420px; 
            height: 25vh; justify-content: space-evenly; align-items: center; 
        }

        .nav-btn { 
            width: 85px; height: 85px; 
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 0, 0, 0.2); 
            border-radius: 50%; color: #ff3131; 
            font-size: 32px; display: flex; justify-content: center; align-items: center;
            transition: 0.15s; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .nav-btn:active { 
            background: rgba(255, 0, 0, 0.2); 
            border-color: #ff3131;
            transform: scale(0.9);
        }
        
        .siren-btn {
            width: 70px; height: 70px; font-size: 28px;
            border-color: rgba(0, 150, 255, 0.3); color: #0096ff;
        }
        .siren-active { background: rgba(0, 150, 255, 0.2); border-color: #0096ff; box-shadow: 0 0 20px rgba(0,150,255,0.5); }

        /* Экраны меню */
        #overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; padding: 25px;
        }

        .main-title { color: #ff3131; font-size: 30px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; text-align: center; }
        .sub-title { color: #ccc; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 35px; }

        .action-btn {
            padding: 18px 50px; background: #ff3131; border: none; color: white;
            font-weight: 800; font-size: 15px; border-radius: 40px; 
            text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 8px 25px rgba(255, 49, 49, 0.4);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-top">
            <div class="glass-panel score-box"><span id="dist">0</span> М</div>
            <div class="glass-panel hp-container">
                <div class="hp-label">Пациент</div>
                <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            </div>
        </div>

        <div id="overlay">
            <div id="menu-content" style="text-align: center;">
                <div class="main-title">Central<br>Hospital</div>
                <div class="sub-title">Black Russia Simulator</div>
                <button id="start-btn" class="action-btn" onclick="startGame()">Заступить на смену</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" id="leftBtn">◀</button>
        <button class="nav-btn siren-btn" id="sirenBtn">🚨</button>
        <button class="nav-btn" id="rightBtn">▶</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const distEl = document.getElementById('dist');
    const hpFill = document.getElementById('hp-fill');
    const overlay = document.getElementById('overlay');
    const menuContent = document.getElementById('menu-content');

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let gameActive = false, score = 0, health = 100, frame = 0, nightRatio = 0;
    let playerX = canvas.width / 2 - 22, obstacles = [], gameSpeed = 7;
    let moveLeft = false, moveRight = false, isSirenOn = false;

    // Звук
    let audioCtx, sirenOsc, sirenGain;
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sirenOsc = audioCtx.createOscillator();
        sirenGain = audioCtx.createGain();
        sirenOsc.type = 'square'; sirenGain.gain.value = 0;
        sirenOsc.connect(sirenGain); sirenGain.connect(audioCtx.destination);
        sirenOsc.start();
    }

    function toggleSiren() {
        isSirenOn = !isSirenOn;
        document.getElementById('sirenBtn').classList.toggle('siren-active');
        if (sirenGain) sirenGain.gain.setValueAtTime(isSirenOn ? 0.05 : 0, audioCtx.currentTime);
    }

    // Управление событиями
    const setupInput = (id, start, end) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', end);
    };

    setupInput('leftBtn', () => moveLeft = true, () => moveLeft = false);
    setupInput('rightBtn', () => moveRight = true, () => moveRight = false);
    document.getElementById('sirenBtn').addEventListener('click', toggleSiren);

    // Лимит 1 раз в день (Для теста удали localStorage.removeItem('br_last_play') в консоли)
    function checkDailyLimit() {
        const lastPlay = localStorage.getItem('br_last_play');
        const today = new Date().toDateString();
        if (lastPlay === today) {
            menuContent.innerHTML = `
                <div class="main-title" style="color: #ff3131;">Смена<br>Окончена</div>
                <div class="sub-title">Лимит исчерпан. Ждем вас завтра!</div>
                <button class="action-btn" style="background:#333" disabled>Завтра в 00:00</button>
            `;
            return false;
        }
        return true;
    }
    checkDailyLimit();

    function drawPlayer(x, y) {
        ctx.save();
        // УСИЛЕННЫЕ ФАРЫ
        if (nightRatio > 0.05) {
            let flicker = 0.7 + Math.random() * 0.1;
            let grad = ctx.createLinearGradient(x + 22, y, x + 22, y - 250);
            grad.addColorStop(0, `rgba(255, 255, 230, ${nightRatio * 0.8 * flicker})`);
            grad.addColorStop(1, 'rgba(255, 255, 200, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(x + 2, y + 10); ctx.lineTo(x - 60, y - 250);
            ctx.lineTo(x + 104, y - 250); ctx.lineTo(x + 42, y + 10);
            ctx.fill();
        }

        ctx.shadowBlur = 15; ctx.shadowColor = "black";
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(x, y, 44, 75, 10); ctx.fill();
        ctx.fillStyle = "#ff3131"; ctx.fillRect(x + 19, y + 35, 6, 18); ctx.fillRect(x + 13, y + 41, 18, 6);
        
        // Мигалки
        let flash = Math.sin(frame * 0.4) > 0;
        ctx.shadowBlur = flash ? 35 : 5;
        ctx.shadowColor = flash ? "red" : "blue";
        ctx.fillStyle = "red"; ctx.fillRect(x+5, y-2, 14, 6);
        ctx.fillStyle = "blue"; ctx.fillRect(x+25, y-2, 14, 6);
        ctx.restore();
    }

    function drawEnemy(ob) {
        ctx.save();
        if (ob.isFast) {
            // УЛУЧШЕННЫЕ БЫСТРЫЕ: Неоново-синий
            ctx.fillStyle = "#00d4ff";
            ctx.shadowBlur = 20; ctx.shadowColor = "#00d4ff";
        } else {
            // КОНТРАСТНЫЕ ОБЫЧНЫЕ: Ярко-красные
            ctx.fillStyle = "#ff1a1a";
            ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.5)";
        }
        ctx.beginPath(); ctx.roundRect(ob.x, ob.y, 44, 70, 8); ctx.fill();
        ctx.fillStyle = "#111"; ctx.fillRect(ob.x+5, ob.y+8, 34, 14); // Окно

        if (nightRatio > 0.2) {
            ctx.shadowBlur = 15; ctx.shadowColor = "yellow";
            ctx.fillStyle = "yellow";
            ctx.fillRect(ob.x+6, ob.y+65, 8, 4); ctx.fillRect(ob.x+30, ob.y+65, 8, 4);
        }
        ctx.restore();
    }

    function update() {
        if (!gameActive) return;
        frame++; score++;
        
        // Плавный цикл времени (ок. 1 минуты на полный круг)
        nightRatio = (Math.sin(frame * 0.002) + 1) / 2;

        if (isSirenOn && audioCtx) {
            sirenOsc.frequency.setValueAtTime(600 + Math.sin(frame * 0.15) * 200, audioCtx.currentTime);
        }

        distEl.innerText = Math.floor(score / 5);
        hpFill.style.width = health + "%";

        if (moveLeft && playerX > 25) playerX -= 8;
        if (moveRight && playerX < canvas.width - 69) playerX += 8;

        if (frame % 32 === 0) {
            let isFast = Math.random() > 0.65;
            obstacles.push({ 
                x: Math.random() * (canvas.width - 90) + 25, 
                y: -100, 
                speed: isFast ? gameSpeed + 5 : gameSpeed, 
                isFast: isFast 
            });
        }

        obstacles.forEach((ob, i) => {
            ob.y += ob.speed;
            if (playerX < ob.x + 40 && playerX + 44 > ob.x && 
                canvas.height - 120 < ob.y + 65 && canvas.height - 50 > ob.y) {
                health -= ob.isFast ? 30 : 20;
                obstacles.splice(i, 1);
                if (health <= 0) endGame();
            }
            if (ob.y > canvas.height) obstacles.splice(i, 1);
        });

        if (score % 800 === 0) gameSpeed += 0.5;
    }

    function draw() {
        // Трава
        let gR = 30 - (nightRatio * 25), gG = 120 - (nightRatio * 105), gB = 30 - (nightRatio * 25);
        ctx.fillStyle = `rgb(${gR}, ${gG}, ${gB})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Дорога
        let rC = 80 - (nightRatio * 65);
        ctx.fillStyle = `rgb(${rC}, ${rC}, ${rC})`;
        ctx.fillRect(20, 0, canvas.width - 40, canvas.height);

        // Разметка
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 + nightRatio * 0.3})`;
        ctx.setLineDash([40, 40]); ctx.lineDashOffset = -frame * gameSpeed;
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();

        obstacles.forEach(ob => drawEnemy(ob));
        drawPlayer(playerX, canvas.height - 120);

        if (gameActive) requestAnimationFrame(drawLoop);
    }

    function drawLoop() { update(); draw(); }

    function startGame() {
        if (!checkDailyLimit()) return;
        localStorage.setItem('br_last_play', new Date().toDateString());
        initAudio();
        gameActive = true; health = 100; score = 0; obstacles = []; gameSpeed = 7;
        overlay.style.display = 'none';
        drawLoop();
    }

    function endGame() {
    gameActive = false;
    if (isSirenOn) toggleSiren();
    overlay.style.display = 'flex';
    
    const finalScore = Math.floor(score / 5);

    menuContent.innerHTML = `
        <div class="main-title" style="font-size: 24px;">Смена Окончена</div>
        <div class="sub-title" style="margin-bottom: 15px;">Дистанция: ${finalScore} м</div>
        
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px;">
            <div style="font-size: 10px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Данные сотрудника</div>
            <input type="text" id="playerNick" placeholder="Ваш Nick_Name" 
                   style="width: 100%; background: #1a1a1a; border: 1px solid #ff3131; color: white; padding: 12px; border-radius: 8px; outline: none; text-align: center; font-family: monospace;">
        </div>

        <button id="sendBtn" class="action-btn" onclick="sendData('${finalScore}')" style="width: 100%;">Отправить отчет</button>
        <div id="statusMsg" style="margin-top: 15px; font-size: 12px; color: #aaa; min-height: 1.2em;"></div>
    `;
}

function sendData(finalScore) {
    const nick = document.getElementById('playerNick').value;
    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('statusMsg');
    
    if (!nick) {
        alert("Введите ваш Nick_Name для отчета!");
        return;
    }

    btn.innerText = "ОТПРАВКА...";
    btn.disabled = true;
    status.innerText = "Сохранение в базу ЦБ...";

    // ВСТАВЬТЕ СВОЮ ССЫЛКУ ИЗ GOOGLE APPS SCRIPT НИЖЕ
    const scriptURL = 'ВАША_ССЫЛКА_ИЗ_APPS_SCRIPT';

    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ nickname: nick, score: finalScore })
    })
    .then(() => {
        status.style.color = "#44ff44";
        status.innerText = "Отчет принят! Возврат в меню...";
        
        // Автоматический переход через 2 секунды
        setTimeout(() => {
            location.reload();
        }, 2000);
    })
    .catch(error => {
        console.error('Ошибка!', error);
        status.style.color = "#ff4444";
        status.innerText = "Ошибка сети. Попробуйте снова.";
        btn.innerText = "ПОВТОРИТЬ";
        btn.disabled = false;
    });
    }
            
</script>
</body>
</html>
