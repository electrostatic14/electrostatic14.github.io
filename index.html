<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>Traffic Racer 3D - AAA Edition</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <!-- 3D Canvas -->
    <div id="game-container">
        <canvas id="canvas3d"></canvas>
    </div>

    <!-- HUD UI -->
    <div class="hud">
        <!-- Top Info Panel -->
        <div class="ui-panel top-panel">
            <div class="info-widget distance-widget">
                <div class="widget-icon">🎯</div>
                <div class="widget-content">
                    <div class="widget-label">Distance</div>
                    <div class="widget-value" id="distance">0</div>
                    <div class="widget-unit">M</div>
                </div>
            </div>

            <div class="info-widget level-widget">
                <div class="widget-icon">⭐</div>
                <div class="widget-content">
                    <div class="widget-label">Level</div>
                    <div class="widget-value" id="level">1</div>
                </div>
            </div>

            <div class="info-widget coins-widget">
                <div class="widget-icon">💰</div>
                <div class="widget-content">
                    <div class="widget-label">Coins</div>
                    <div class="widget-value" id="coins">0</div>
                </div>
            </div>
        </div>

        <!-- Speed Display -->
        <div class="speed-gauge">
            <div class="gauge-background">
                <div class="gauge-fill" id="gaugeFill"></div>
            </div>
            <div class="speed-display">
                <div class="speed-value" id="speed">0</div>
                <div class="speed-label">КМ/Ч</div>
            </div>
        </div>

        <!-- Minimap -->
        <div class="minimap">
            <canvas id="minimapCanvas" width="150" height="200"></canvas>
        </div>

        <!-- Games Counter -->
        <div class="games-counter" id="gamesLeft">
            <div class="counter-icon">🎮</div>
            <div class="counter-text" id="gamesLeftText">2</div>
        </div>

        <!-- Combo Counter -->
        <div class="combo-display" id="comboDisplay" style="display: none;">
            <div class="combo-value" id="comboValue">x2</div>
            <div class="combo-label">COMBO!</div>
        </div>

        <!-- Warning Alerts -->
        <div class="warning-alert" id="warningAlert" style="display: none;"></div>
    </div>

    <!-- Control Buttons -->
    <div class="controls">
        <button class="nav-btn nav-left" id="leftBtn" aria-label="Move Left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <button class="nav-btn nav-center" id="centerBtn" aria-label="Brake">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <circle cx="12" cy="12" r="8"/>
            </svg>
        </button>
        <button class="nav-btn nav-right" id="rightBtn" aria-label="Move Right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
    </div>

    <!-- Main Menu -->
    <div id="overlay" class="menu-overlay">
        <div class="stars-bg"></div>
        <div class="menu-container">
            <div class="menu-header">
                <div class="game-title">
                    <span class="title-main">TRAFFIC</span>
                    <span class="title-sub">RACER 3D</span>
                </div>
                <div class="game-subtitle">AAA EDITION - Dodge & Survive</div>
                <div class="version-tag">v2.0</div>
            </div>

            <!-- Difficulty Selection -->
            <div class="difficulty-section">
                <div class="section-label">Select Difficulty</div>
                <div class="difficulty-buttons">
                    <button class="difficulty-btn selected" data-difficulty="easy">
                        <div class="btn-label">EASY</div>
                        <div class="btn-desc">Relaxed</div>
                    </button>
                    <button class="difficulty-btn" data-difficulty="normal">
                        <div class="btn-label">NORMAL</div>
                        <div class="btn-desc">Balanced</div>
                    </button>
                    <button class="difficulty-btn" data-difficulty="hard">
                        <div class="btn-label">HARD</div>
                        <div class="btn-desc">Challenge</div>
                    </button>
                    <button class="difficulty-btn" data-difficulty="insane">
                        <div class="btn-label">INSANE</div>
                        <div class="btn-desc">Extreme</div>
                    </button>
                </div>
            </div>

            <!-- Game Stats -->
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-icon">🏆</span>
                    <span class="stat-text" id="bestScore">Best: 0 M</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-text" id="totalGames">Games: 0</span>
                </div>
            </div>

            <!-- Start Button -->
            <button class="action-btn btn-start" id="startBtn">
                <span class="btn-glow"></span>
                LAUNCH GAME
            </button>

            <!-- Info Panel -->
            <div class="info-banner">
                <span class="banner-icon">ℹ️</span>
                <span>Avoid traffic • Collect coins • Survive as long as you can</span>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="game-over-screen" style="display: none;">
        <div class="game-over-content">
            <div class="game-over-header">
                <div class="crash-effect">💥</div>
                <div class="game-over-title">CRASHED!</div>
            </div>

            <div class="stats-panel">
                <div class="stat-row">
                    <span class="stat-label">📍 Distance:</span>
                    <span class="stat-value" id="finalDistance">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">⭐ Level:</span>
                    <span class="stat-value" id="finalLevel">1</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">💰 Coins:</span>
                    <span class="stat-value" id="finalCoins">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">⏱️ Time:</span>
                    <span class="stat-value" id="finalTime">0s</span>
                </div>
            </div>

            <div class="player-input-section">
                <label class="input-label">Enter Your Name</label>
                <input type="text" id="playerNick" class="input-field" placeholder="YourNickname" maxlength="25">
            </div>

            <button id="sendBtn" class="action-btn btn-submit">
                <span class="btn-text">SUBMIT SCORE</span>
                <span class="btn-loader"></span>
            </button>
            <div class="status-msg" id="statusMsg"></div>

            <button class="action-btn-secondary btn-replay" onclick="location.reload()">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">INITIALIZING ENGINE...</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/player.js"></script>
    <script src="js/traffic.js"></script>
    <script src="js/environment.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
